<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>魔改戰棋基底222 - 終極完美無瑕版</title>
    <style>
        body { font-family: sans-serif; background-color: #1e272e; color: white; margin: 0; padding: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; width: 100vw; }
        
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #1e272e; z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px;
            padding: 10px; box-sizing: border-box;
        }
        
        .video-container {
            width: 100%; max-width: 95vw; max-height: 60vh; aspect-ratio: 16/9;
            border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.9);
            overflow: hidden; background-color: #000;
        }
        .video-container img { width: 100%; height: 100%; object-fit: cover; }

        #intro-panel { 
            padding: 15px; background: #485460; border-radius: 8px; width: 100%; max-width: 400px; 
            display: flex; flex-direction: column; align-items: center; box-sizing: border-box; flex-shrink: 0; 
        }
        #intro-msg { font-size: 16px; margin-bottom: 15px; text-align: center; line-height: 1.4; font-weight: bold; }
        
        .intro-buttons { display: flex; gap: 10px; }
        #introLoadBtn { background-color: #eb3b5a; font-size: 16px; padding: 10px 20px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
        #introLoadBtn:hover { background-color: #fc5c65; }
        #introNewBtn { background-color: #3498db; font-size: 16px; padding: 10px 20px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
        #introNewBtn:hover { background-color: #2980b9; }

        #app-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; max-width: 1200px; gap: 15px; padding: 10px; box-sizing: border-box; }
        canvas { background-color: #1e272e; box-shadow: 0 0 15px rgba(0,0,0,0.9); border-radius: 8px; touch-action: none; width: 100%; max-width: 95vw; max-height: 60vh; aspect-ratio: 1 / 1; }
        
        #panel { 
            padding: 15px; 
            background: #485460; 
            border-radius: 8px; 
            width: 100%; 
            max-width: 400px; 
            height: 190px;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            box-sizing: border-box; 
            flex-shrink: 0; 
        }

        #msg { 
            font-size: 14px; 
            margin-bottom: 15px; 
            height: 110px;           
            min-height: 110px;       
            max-height: 110px;       
            overflow-y: auto;       
            display: block;         
            padding: 10px;          
            line-height: 1.5; 
            width: 100%; 
            text-align: center; 
            box-sizing: border-box; 
            background-color: rgba(0, 0, 0, 0.15); 
            border-radius: 6px;
        }

        .btn-group { 
            display: flex; 
            width: 100%; 
            position: relative; 
            justify-content: center; 
            align-items: center; 
        }
        
        button { padding: 10px 20px; font-size: 16px; background-color: #0fb9b1; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0d9690; }
        button:disabled { background-color: #7f8fa6; cursor: not-allowed; }
        
        #resetBtn { 
            position: absolute; 
            right: 0; 
            padding: 6px 12px; 
            font-size: 12px; 
            border-radius: 20px; 
            background-color: #b33939; 
            opacity: 0.5; 
            transition: 0.3s; 
        }
        #resetBtn:hover { 
            background-color: #ff5252; 
            opacity: 1; 
        }

        @media (orientation: landscape) and (min-width: 600px) {
            #app-wrapper { flex-direction: row; gap: 30px; padding: 20px; }
            canvas { max-width: 65vw; max-height: 90vh; }
            #panel { width: 300px; max-width: none; justify-content: center; height: auto; }
            #intro-screen { flex-direction: row; gap: 30px; padding: 20px; }
            .video-container { max-width: 65vw; max-height: 90vh; }
            #intro-panel { width: 300px; max-width: none; justify-content: center; }
        }
    </style>
</head>
<body>
    <div id="intro-screen">
        <div class="video-container">
            <img src="img/title.gif" alt="遊戲片頭動畫">
        </div>
        <div id="intro-panel">
            <div id="intro-msg">準備好指揮你的軍隊了嗎？</div>
            <div class="intro-buttons">
                <button id="introLoadBtn">本機存檔</button>
                <button id="introNewBtn">進入遊戲</button>
            </div>
        </div>
    </div>

    <div id="app-wrapper">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="panel">
            <div id="msg">資源載入中，請稍候...</div>
            <div class="btn-group">
                <button id="endTurnBtn">結束回合</button>
                <button id="resetBtn">重新開始</button>
            </div>
        </div>
    </div>

    <script src="grid.js"></script>
    <script src="ai.js"></script>
    <script src="game.js"></script>
</body>
</html>
